<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ファイルアップロード</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f0f2f5;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: #1a73e8;
      color: #fff;
      padding: 16px 24px;
      font-size: 18px;
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    header a {
      color: #fff;
      text-decoration: none;
      font-size: 14px;
      opacity: 0.85;
    }

    header a:hover { opacity: 1; }

    .container {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .upload-card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      padding: 40px;
      max-width: 480px;
      width: 100%;
      text-align: center;
    }

    .upload-card h2 {
      margin-bottom: 8px;
      color: #1e1e1e;
    }

    .upload-card p {
      color: #666;
      margin-bottom: 24px;
      font-size: 14px;
    }

    .drop-zone {
      border: 2px dashed #ccc;
      border-radius: 8px;
      padding: 40px 20px;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      margin-bottom: 20px;
    }

    .drop-zone.dragover {
      border-color: #1a73e8;
      background: #e8f0fe;
    }

    .drop-zone.has-file {
      border-color: #34a853;
      background: #e6f4ea;
    }

    .drop-zone-text {
      color: #888;
      font-size: 15px;
    }

    .file-name {
      color: #1e1e1e;
      font-weight: 600;
      font-size: 15px;
    }

    input[type="file"] { display: none; }

    #upload-btn {
      padding: 12px 32px;
      background: #1a73e8;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      cursor: pointer;
      width: 100%;
    }

    #upload-btn:disabled {
      background: #94bdf2;
      cursor: not-allowed;
    }

    .status {
      margin-top: 16px;
      font-size: 14px;
      min-height: 20px;
    }

    .status.success { color: #34a853; }
    .status.error { color: #d93025; }
  </style>
</head>
<body>
  <header>
    <span>ファイルアップロード</span>
    <a href="/">← チャットに戻る</a>
  </header>

  <div class="container">
    <div class="upload-card">
      <h2>テキストファイルをアップロード</h2>
      <p>.txt ファイルを1つ選択してください</p>

      <div class="drop-zone" id="drop-zone">
        <span class="drop-zone-text" id="drop-zone-text">ここにファイルをドラッグ＆ドロップ<br>またはクリックして選択</span>
      </div>

      <input type="file" id="file-input" accept=".txt">

      <button id="upload-btn" disabled>アップロード</button>

      <div class="status" id="status"></div>
    </div>
  </div>

  <script>
    const dropZone = document.getElementById("drop-zone");
    const dropZoneText = document.getElementById("drop-zone-text");
    const fileInput = document.getElementById("file-input");
    const uploadBtn = document.getElementById("upload-btn");
    const status = document.getElementById("status");

    let selectedFile = null;

    dropZone.addEventListener("click", () => fileInput.click());

    dropZone.addEventListener("dragover", (e) => {
      e.preventDefault();
      dropZone.classList.add("dragover");
    });

    dropZone.addEventListener("dragleave", () => {
      dropZone.classList.remove("dragover");
    });

    dropZone.addEventListener("drop", (e) => {
      e.preventDefault();
      dropZone.classList.remove("dragover");
      const files = e.dataTransfer.files;
      if (files.length > 0) handleFile(files[0]);
    });

    fileInput.addEventListener("change", () => {
      if (fileInput.files.length > 0) handleFile(fileInput.files[0]);
    });

    function handleFile(file) {
      if (!file.name.endsWith(".txt")) {
        status.textContent = ".txt ファイルのみアップロードできます";
        status.className = "status error";
        return;
      }
      selectedFile = file;
      dropZoneText.innerHTML = `<span class="file-name">${file.name}</span>`;
      dropZone.classList.add("has-file");
      uploadBtn.disabled = false;
      status.textContent = "";
      status.className = "status";
    }

    uploadBtn.addEventListener("click", async () => {
      if (!selectedFile) return;

      uploadBtn.disabled = true;
      status.textContent = "アップロード中...";
      status.className = "status";

      const formData = new FormData();
      formData.append("file", selectedFile);

      try {
        const res = await fetch("/upload", { method: "POST", body: formData });
        const data = await res.json();

        if (res.ok) {
          status.textContent = `「${data.filename}」をアップロードしました`;
          status.className = "status success";
          selectedFile = null;
          dropZoneText.textContent = "ここにファイルをドラッグ＆ドロップ\nまたはクリックして選択";
          dropZone.classList.remove("has-file");
        } else {
          status.textContent = data.detail || "アップロードに失敗しました";
          status.className = "status error";
          uploadBtn.disabled = false;
        }
      } catch (err) {
        status.textContent = "エラー: " + err.message;
        status.className = "status error";
        uploadBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
